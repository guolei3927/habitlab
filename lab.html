<section class="section fade-in">
  <div class="container">
    <div class="lab-grid">

      <!-- Tool 1: Compound Calculator -->
      <a href="/lab/compound-calculator.html" class="card lab-card lab-card-primary">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" style="margin-bottom: 16px;">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
        <h3>复利计算器</h3>
        <p>输入你的微习惯和每天投入时间，看看一年后你会积累多少。</p>
        <span class="btn btn-primary">立即体验</span>
      </a>

      <!-- Tool 2: Habit Selector -->
      <a href="/lab/habit-selector.html" class="card lab-card lab-card-green">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" style="margin-bottom: 16px;">

          <path d="m9 12 2 2 4-4"/>

        <h3>习惯匹配器</h3>
        <p>回答几个问题，为你推荐最适合你的第一个微习惯。</p>
        <span class="btn btn-green">开始测试</span>
      </a>

      <div class="card lab-card" style="background: linear-gradient(135deg, #F59E0B, #EF4444); color: white; opacity: 0.7;">

        <span class="btn" style="background: rgba(255,255,255,0.2); color: white; cursor: default;">即将上线</span>
